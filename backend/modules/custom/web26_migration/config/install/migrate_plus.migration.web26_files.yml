id: web26_files
label: 'Web26 files'
migration_group: web26
source:
  plugin: d7_file
  source_base_path: /legacy/sites/default/files
  constants:
    source_base_path: /legacy/sites/default/files
process:
  fid: fid
  filename: filename
  source_full_path:
    plugin: web26_public_uri_to_legacy_path
    source: uri
    base_path: /legacy/sites/default/files
  uri:
    plugin: file_copy
    source:
      - '@source_full_path'
      - uri
    file_exists: rename
  filemime: filemime
  filesize: filesize
  status: status
  created: timestamp
  changed: timestamp
  uid:
    plugin: migration_lookup
    migration: web26_users
    source: uid
destination:
  plugin: 'entity:file'
migration_dependencies:
  required:
    - web26_users
  optional: {  }
