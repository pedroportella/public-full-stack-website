id: web26_media_images
label: 'Web26 image media'
migration_group: web26
source:
  plugin: d7_file
  source_base_path: /legacy/sites/default/files
  constants:
    bundle: image
    source_base_path: /legacy/sites/default/files
process:
  bundle: constants/bundle
  name: filename
  field_legacy_fid: fid
  field_media_image/target_id:
    plugin: migration_lookup
    migration: web26_files
    source: fid
  field_media_image/alt: filename
  status: status
  created: timestamp
  changed: timestamp
  uid:
    plugin: migration_lookup
    migration: web26_users
    source: uid
destination:
  plugin: 'entity:media'
migration_dependencies:
  required:
    - web26_users
    - web26_files
  optional: {  }
